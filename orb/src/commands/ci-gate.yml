description: >
  Verify all required jobs passed by checking this job's workflow dependencies via the CircleCI API
  (matches $CIRCLE_JOB, e.g. ci-gate or required-contracts-ci). With always-succeed, the check is skipped.
parameters:
  circleci-api-token:
    type: env_var_name
    description: "Name of the environment variable holding the CircleCI API token"
    default: "CIRCLE_API_TOKEN"
  always-succeed:
    type: boolean
    default: false
    description: >
      When true, skip the dependency check and exit successfully (no API token required).
steps:
  - run:
      name: Verify all required jobs passed
      command: |
        set -euo pipefail

        if [ "<< parameters.always-succeed >>" = "true" ]; then
          echo "Skipping ci-gate: always-succeed is true."
          exit 0
        fi

        if [ -z "${<< parameters.circleci-api-token >>:-}" ]; then
          echo "ERROR: << parameters.circleci-api-token >> is not set"
          exit 1
        fi

        # Fetch all jobs across all pages.
        fetch_all_jobs() {
          local base="https://circleci.com/api/v2/workflow/$CIRCLE_WORKFLOW_ID/job"
          local token="${<< parameters.circleci-api-token >>}"
          local next_token=""
          local all_items="[]"

          while true; do
            local url="$base"
            if [ -n "$next_token" ]; then
              url="$base?page-token=$next_token"
            fi

            local page
            page=$(curl -sf -H "Circle-Token: $token" "$url")

            all_items=$(echo "$all_items $page" | jq -s '.[0] + .[1].items')
            next_token=$(echo "$page" | jq -r '.next_page_token // empty')

            if [ -z "$next_token" ]; then
              break
            fi
          done

          echo "$all_items"
        }

        JOBS=$(fetch_all_jobs)

        # Derive required jobs from this job's dependencies in the API response.
        # The name must match $CIRCLE_JOB (e.g. ci-gate on main, required-contracts-ci on contracts workflows).
        GATE_NAME="${CIRCLE_JOB:-}"
        if [ -z "$GATE_NAME" ]; then
          echo "ERROR: CIRCLE_JOB is not set"
          exit 1
        fi
        DEP_IDS=$(echo "$JOBS" | jq -r --arg name "$GATE_NAME" '.[] | select(.name == $name) | .dependencies[]')

        if [ -z "$DEP_IDS" ]; then
          echo "ERROR: no dependency IDs found — possible API failure or gate job \"$GATE_NAME\" not found in workflow"
          exit 1
        fi

        echo "Checking required jobs for $GATE_NAME..."
        ALL_PASSED=true
        for dep_id in $DEP_IDS; do
          NAME=$(echo "$JOBS" | jq -r --arg id "$dep_id" '.[] | select(.id == $id) | .name')
          STATUS=$(echo "$JOBS" | jq -r --arg id "$dep_id" '.[] | select(.id == $id) | .status')
          if [ "$STATUS" = "success" ]; then
            echo "  ok $NAME: $STATUS"
          else
            echo "  FAIL $NAME: $STATUS"
            ALL_PASSED=false
          fi
        done

        if [ "$ALL_PASSED" = "false" ]; then
          echo "Some required jobs did not pass."
          exit 1
        fi
        echo "All required jobs passed."
